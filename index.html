<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор прописей | Точилка</title>
  <script>
    window.dataLayer = window.dataLayer || [];
    (function () {
      var params = new URLSearchParams(location.search);
      ['utm_source', 'utm_medium', 'utm_campaign'].forEach(function (k) {
        var v = params.get(k);
        if (v) sessionStorage.setItem(k, v);
      });
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/onlinetochilka/theme@main/tochilka-theme.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="tochilka-theme layout-1-page">

  <div class="app-container">
    <div class="app-layout">

      <!-- ─── Sidebar ─── -->
      <aside class="app-sidebar no-print" aria-label="Настройки">

        <header class="brand-header">
          <img
            class="brand-logo"
            src="https://raw.githubusercontent.com/onlinetochilka/theme@main/tochilka-logo.svg"
            alt="Точилка"
            width="42"
            height="42"
          >
          <div class="brand-text">
            <h1 class="brand-title">Генератор прописей</h1>
            <p class="brand-subtitle">Листы для тренировки почерка</p>
          </div>
        </header>

        <div class="neumo-card sidebar-card">
          <div class="controls-stack">

            <!-- Текст -->
            <div class="control-group">
              <div class="control-label-row">
                <span class="control-label">Текст</span>
                <button
                  type="button"
                  class="info-trigger"
                  data-tip="Поставьте две запятые после буквы (замо,,к) для автоматического ударения"
                  aria-label="Подсказка об ударении"
                  tabindex="0"
                >i</button>
              </div>
              <div class="editor-panel neumo-inset">
                <div class="editor-toolbar" role="toolbar" aria-label="Форматирование">
                  <div class="toolbar-group neumo-inset">
                    <span class="toolbar-group__label">Цвет</span>
                    <button type="button" class="toolbar-btn interactive" data-action="text-color-black" data-color="#0F172A" title="Чёрный" aria-label="Чёрный">
                      <span class="color-dot" style="background:#0F172A"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="text-color-red" data-color="#C62828" title="Красный" aria-label="Красный">
                      <span class="color-dot" style="background:#C62828"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="text-color-green" data-color="#2E7D32" title="Зелёный" aria-label="Зелёный">
                      <span class="color-dot" style="background:#2E7D32"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="text-color-blue" data-color="#1565C0" title="Синий" aria-label="Синий">
                      <span class="color-dot" style="background:#1565C0"></span>
                    </button>
                  </div>

                  <div class="toolbar-group neumo-inset">
                    <span class="toolbar-group__label">Линия</span>
                    <button type="button" class="toolbar-btn interactive is-active" data-action="line-color-black" data-color="#0F172A" title="Чёрная линия" aria-label="Чёрная линия">
                      <span class="color-dot" style="background:#0F172A"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="line-color-red" data-color="#C62828" title="Красная линия" aria-label="Красная линия">
                      <span class="color-dot" style="background:#C62828"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="line-color-green" data-color="#2E7D32" title="Зелёная линия" aria-label="Зелёная линия">
                      <span class="color-dot" style="background:#2E7D32"></span>
                    </button>
                    <button type="button" class="toolbar-btn interactive" data-action="line-color-blue" data-color="#1565C0" title="Синяя линия" aria-label="Синяя линия">
                      <span class="color-dot" style="background:#1565C0"></span>
                    </button>
                  </div>

                  <div class="toolbar-group neumo-inset">
                    <button type="button" class="toolbar-btn interactive" data-action="underline-solid" data-ul="solid" title="Подлежащее" aria-label="Подлежащее">_</button>
                    <button type="button" class="toolbar-btn interactive" data-action="underline-double" data-ul="double" title="Сказуемое" aria-label="Сказуемое">=</button>
                    <button type="button" class="toolbar-btn interactive" data-action="underline-wavy" data-ul="wavy" title="Определение" aria-label="Определение">~</button>
                    <button type="button" class="toolbar-btn interactive" data-action="underline-dashed" data-ul="dashed" title="Дополнение" aria-label="Дополнение">- -</button>
                    <button type="button" class="toolbar-btn interactive" data-action="underline-dotdash" data-ul="dotdash" title="Обстоятельство" aria-label="Обстоятельство">-·-</button>
                  </div>

                  <div class="toolbar-group neumo-inset">
                    <button type="button" class="toolbar-btn interactive" data-action="clear-format" title="Очистить формат" aria-label="Очистить формат">⌫</button>
                  </div>
                </div>

                <div
                  id="textEditor"
                  class="editor-area interactive"
                  contenteditable="true"
                  role="textbox"
                  aria-multiline="true"
                  data-action="text-editor"
                  data-placeholder="Введите текст для прописей…"
                ><div>Аа Бб Вв Гг Дд</div><div>Пишу красиво и легко.</div><div>Задача №5.</div><div>1) 39 + 47 = 86 (см)</div><div>С Точилкой всё сходится!</div></div>
              </div>
            </div>

            <!-- Формат -->
            <div class="control-group">
              <span class="control-label">Формат</span>
              <div class="segmented" role="group" aria-label="Формат листа">
                <input class="segmented__input" type="radio" name="format" id="format-a4" value="a4" data-action="format-a4-select" checked>
                <label class="segmented__label interactive" for="format-a4">А4</label>
                <input class="segmented__input" type="radio" name="format" id="format-a5" value="a5" data-action="format-a5-select">
                <label class="segmented__label interactive" for="format-a5">А5</label>
                <input class="segmented__input" type="radio" name="format" id="format-a3" value="a3" data-action="format-a3-select">
                <label class="segmented__label interactive" for="format-a3">А3</label>
              </div>
            </div>

            <!-- Ориентация -->
            <div class="control-group">
              <span class="control-label">Ориентация</span>
              <div class="segmented" role="group" aria-label="Ориентация">
                <input class="segmented__input" type="radio" name="orientation" id="orient-portrait" value="portrait" data-action="orientation-portrait-select" checked>
                <label class="segmented__label interactive" for="orient-portrait">Книжная</label>
                <input class="segmented__input" type="radio" name="orientation" id="orient-landscape" value="landscape" data-action="orientation-landscape-select">
                <label class="segmented__label interactive" for="orient-landscape">Альбомная</label>
              </div>
            </div>

            <!-- Разлиновка -->
            <div class="control-group">
              <span class="control-label">Разлиновка</span>
              <div class="segmented" role="group" aria-label="Разлиновка">
                <input class="segmented__input" type="radio" name="grid" id="grid-frequent" value="frequent" data-action="grid-frequent-select">
                <label class="segmented__label interactive" for="grid-frequent">Частая</label>
                <input class="segmented__input" type="radio" name="grid" id="grid-slanted" value="slanted" data-action="grid-slanted-select">
                <label class="segmented__label interactive" for="grid-slanted">Косая</label>
                <input class="segmented__input" type="radio" name="grid" id="grid-narrow" value="narrow" data-action="grid-narrow-select">
                <label class="segmented__label interactive" for="grid-narrow">Узкая</label>
                <input class="segmented__input" type="radio" name="grid" id="grid-wide" value="wide" data-action="grid-wide-select">
                <label class="segmented__label interactive" for="grid-wide">Широкая</label>
                <input class="segmented__input" type="radio" name="grid" id="grid-squared" value="squared" data-action="grid-squared-select" checked>
                <label class="segmented__label interactive" for="grid-squared">Клетка</label>
              </div>
            </div>

            <!-- Режим -->
            <div class="control-group">
              <span class="control-label">Режим</span>
              <div class="segmented" role="group" aria-label="Режим письма">
                <input class="segmented__input" type="radio" name="mode" id="mode-tracing" value="tracing" data-action="mode-tracing-select" checked>
                <label class="segmented__label interactive" for="mode-tracing">Обводка</label>
                <input class="segmented__input" type="radio" name="mode" id="mode-copy" value="copy" data-action="mode-copy-select">
                <label class="segmented__label interactive" for="mode-copy">Списывание</label>
                <input class="segmented__input" type="radio" name="mode" id="mode-alternating" value="alternating" data-action="mode-alternating-select">
                <label class="segmented__label interactive" for="mode-alternating">Чередование</label>
              </div>
            </div>

            <!-- Печать -->
            <div class="control-group">
              <div class="control-label-row">
                <span class="control-label">Печать</span>
                <button
                  type="button"
                  class="info-trigger"
                  data-tip="В настройках принтера выберите поля «По умолчанию» и включите «Печать фоновой графики»"
                  aria-label="Подсказка о печати"
                  tabindex="0"
                >i</button>
              </div>
              <div class="segmented" role="group" aria-label="Размещение страниц">
                <input class="segmented__input" type="radio" name="layout" id="layout-1" value="1-page" data-action="layout-1-page-select" checked>
                <label class="segmented__label interactive" for="layout-1">1 лист</label>
                <input class="segmented__input" type="radio" name="layout" id="layout-2" value="2-pages" data-action="layout-2-pages-select">
                <label class="segmented__label interactive" for="layout-2">2 листа</label>
              </div>
            </div>

            <!-- Actions -->
            <div class="action-area">
              <button type="button" class="btn-primary interactive" data-action="print-save-pdf">Распечатать / Сохранить PDF</button>
              <button type="button" class="btn-secondary interactive" data-action="download-png">Скачать PNG</button>
            </div>

          </div>
        </div>
      </aside>

      <!-- ─── Preview ─── -->
      <section class="app-preview" id="previewContainer" aria-label="Превью листа">
        <div class="preview-stage">
          <div class="preview-sheet-wrap" id="previewSheetWrap">
            <article class="worksheet-paper mode-tracing grid-squared" data-format="a4">
              <div class="svg-background" aria-hidden="true"></div>
              <div class="red-line" aria-hidden="true"></div>
              <div class="text-content"></div>
            </article>
            <article class="worksheet-paper mode-tracing grid-squared" data-format="a4">
              <div class="svg-background" aria-hidden="true"></div>
              <div class="red-line" aria-hidden="true"></div>
              <div class="text-content"></div>
            </article>
            <p class="preview-placeholder" id="previewPlaceholder" hidden>Начните вводить текст слева, и он появится здесь</p>
          </div>
        </div>
      </section>

    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
